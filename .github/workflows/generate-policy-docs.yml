name: Generate Policy Documents

on:
  push:
    branches:
      - main
    paths-ignore:
      - "releases/**"

concurrency:
  group: generate-policy-docs-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            fonts-liberation \
            lmodern

      - name: Sync checkout to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set version string
        id: version
        run: |
          VERSION="v$(date -u +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          SOURCE_COMMIT="$(git rev-parse HEAD)"
          DATE="$(date -u +'%B %d, %Y')"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_COMMIT=${SOURCE_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "DATE=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Combine policy documents
        run: |
          python3 .github/scripts/combine_policy.py \
            "${{ steps.version.outputs.VERSION }}" \
            "${{ steps.version.outputs.DATE }}" \
            /tmp/aiwa-policy-combined.md

      - name: Generate DOCX
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p releases
          pandoc /tmp/aiwa-policy-combined.md \
            --from markdown \
            --to docx \
            --toc \
            --output "releases/AIWA-Policy-${VERSION}.docx"

      - name: Generate PDF
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p releases
          pandoc /tmp/aiwa-policy-combined.md \
            --from markdown \
            --to pdf \
            --pdf-engine=xelatex \
            --output "releases/AIWA-Policy-${VERSION}.pdf"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: AIWA-Policy-${{ steps.version.outputs.VERSION }}
          path: |
            releases/AIWA-Policy-${{ steps.version.outputs.VERSION }}.docx
            releases/AIWA-Policy-${{ steps.version.outputs.VERSION }}.pdf
          retention-days: 90

      - name: Commit and push versioned documents to repository
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "releases/AIWA-Policy-${VERSION}.docx" "releases/AIWA-Policy-${VERSION}.pdf"

          if git diff --staged --quiet; then
            echo "No new documents to commit."
            exit 0
          fi

          git commit -m "docs: release policy documents ${VERSION} [skip ci]"

          for attempt in 1 2 3; do
            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase attempt ${attempt} failed; retrying."
              git rebase --abort || true

              if [ "${attempt}" -eq 3 ]; then
                echo "Failed to rebase release documents after 3 attempts."
                exit 1
              fi

              sleep $((attempt * 5))
              continue
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying."
            git rebase --abort || true

            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push release documents after 3 attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Publish GitHub Release with policy documents
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SOURCE_COMMIT: ${{ steps.version.outputs.SOURCE_COMMIT }}
          DATE: ${{ steps.version.outputs.DATE }}
        run: |
          # Skip if a release for this version already exists
          if gh release view "${VERSION}" &>/dev/null; then
            echo "Release ${VERSION} already exists — skipping."
            exit 0
          fi

          RELEASE_NOTES=$(cat <<EOF
          Automated release of the AIWA Policy & Governance Framework.

          **Version:** ${VERSION}
          **Date:** ${DATE}
          **Commit:** ${SOURCE_COMMIT}

          This release contains the complete AIWA policy framework compiled into DOCX and PDF formats, covering governance, standards, foundational documents, and all Tier 1–3 policy documents.
          EOF
          )

          gh release create "${VERSION}" \
            "releases/AIWA-Policy-${VERSION}.docx" \
            "releases/AIWA-Policy-${VERSION}.pdf" \
            --title "AIWA Policy Framework ${VERSION}" \
            --notes "${RELEASE_NOTES}" \
            --latest
