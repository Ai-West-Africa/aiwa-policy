name: Generate Policy Documents

on:
  push:
    paths-ignore:
      - "releases/**"

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            fonts-liberation

      - name: Set version string
        id: version
        run: |
          VERSION="v$(date -u +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          DATE="$(date -u +'%B %d, %Y')"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "DATE=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Combine policy documents
        run: |
          python3 .github/scripts/combine_policy.py \
            "${{ steps.version.outputs.VERSION }}" \
            "${{ steps.version.outputs.DATE }}" \
            /tmp/aiwa-policy-combined.md

      - name: Generate DOCX
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p releases
          pandoc /tmp/aiwa-policy-combined.md \
            --from markdown \
            --to docx \
            --toc \
            --output "releases/AIWA-Policy-${VERSION}.docx"

      - name: Generate PDF
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p releases
          pandoc /tmp/aiwa-policy-combined.md \
            --from markdown \
            --to pdf \
            --pdf-engine=xelatex \
            --output "releases/AIWA-Policy-${VERSION}.pdf"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIWA-Policy-${{ steps.version.outputs.VERSION }}
          path: |
            releases/AIWA-Policy-${{ steps.version.outputs.VERSION }}.docx
            releases/AIWA-Policy-${{ steps.version.outputs.VERSION }}.pdf
          retention-days: 90

      - name: Commit versioned documents to repository
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/
          if git diff --staged --quiet; then
            echo "No new documents to commit."
          else
            git commit -m "docs: release policy documents ${VERSION} [skip ci]"
            git push
          fi
